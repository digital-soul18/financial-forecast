[deploy]
startCommand = "node_modules/.bin/prisma migrate deploy; echo \"[diag] prisma exit=$?\"; echo \"[diag] PORT=${PORT} NODE_ENV=${NODE_ENV}\"; node_modules/.bin/next start -p ${PORT:-3000} -H 0.0.0.0; echo \"[diag] next exit=$?\""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/data"
