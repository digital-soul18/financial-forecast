<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e5e7eb;
    }

    /* ── Scroll container ── */
    #scroll {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #000;
      scroll-behavior: smooth;
    }

    /* ── Pages ── */
    #pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0;
      background: #000;
    }

    .page-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      background: #000;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      background: #000;
    }

    /* ── Loading / error states ── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      gap: 16px;
      z-index: 10;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #374151;
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 13px;
      color: #6b7280;
    }

    #error {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      padding: 32px;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading pitch deck…</p>
  </div>

  <div id="error"></div>

  <div id="scroll">
    <div id="pages"></div>
  </div>

  <script type="module">
    // PDF.js via jsDelivr CDN
    const PDFJS_VERSION = '4.4.168';
    const CDN = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}`;

    import * as pdfjsLib from `${CDN}/build/pdf.min.mjs`;
    pdfjsLib.GlobalWorkerOptions.workerSrc = `${CDN}/build/pdf.worker.min.mjs`;

    const params   = new URLSearchParams(window.location.search);
    const pdfUrl   = params.get('file') || '/ConversationalAI-Investor-Pack.pdf';
    const loading  = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    const pages    = document.getElementById('pages');
    const scroll   = document.getElementById('scroll');

    function showError(msg) {
      loading.style.display = 'none';
      errorDiv.style.display = 'flex';
      errorDiv.textContent   = msg;
    }

    // Pixel ratio for crisp rendering on HiDPI screens (capped at 2)
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    async function render() {
      let pdf;
      try {
        pdf = await pdfjsLib.getDocument({ url: pdfUrl, withCredentials: false }).promise;
      } catch (e) {
        showError('Could not load PDF: ' + e.message);
        return;
      }

      loading.style.display = 'none';

      // Render pages sequentially so memory doesn't spike
      for (let n = 1; n <= pdf.numPages; n++) {
        const page     = await pdf.getPage(n);
        const baseVp   = page.getViewport({ scale: 1 });

        // Scale so the page fills the full container width
        const scale    = (scroll.clientWidth * DPR) / baseVp.width;
        const viewport = page.getViewport({ scale });

        const wrap   = document.createElement('div');
        wrap.className = 'page-wrap';

        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(viewport.width);
        canvas.height = Math.round(viewport.height);

        // CSS size = physical / DPR so it looks right
        canvas.style.width  = Math.round(viewport.width  / DPR) + 'px';
        canvas.style.height = Math.round(viewport.height / DPR) + 'px';

        const ctx = canvas.getContext('2d');

        // Fill black before rendering (avoids white flash on transparent areas)
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        wrap.appendChild(canvas);
        pages.appendChild(wrap);
      }
    }

    // Re-render on resize so pages stay full-width
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        pages.innerHTML = '';
        loading.style.display = 'flex';
        render();
      }, 300);
    });

    render();
  </script>
</body>
</html>
